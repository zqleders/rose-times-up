name: Server Auto Renew

on:
  schedule:
    - cron: '0 */6 * * *'  # 默认每6小时执行一次
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests

      - name: Install and Start Proxy
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] No proxy node provided, running in direct mode..."
            exit 0
          fi
          
          TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION=${TAG#v}
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${TAG}/sing-box-${VERSION}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${VERSION}-linux-amd64.tar.gz"
          mv "sing-box-${VERSION}-linux-amd64/sing-box" . && chmod +x sing-box
          
          python3 << 'PYEOF'
          import os, json, base64
          from urllib.parse import urlparse, parse_qs, unquote

          def generate_singbox_config():
              url = os.environ.get("PROXY_NODE", "").strip()
              p = urlparse(url)
              scheme = p.scheme.lower()
              params = {k: v[0] for k, v in parse_qs(p.query).items()}
              
              config = {
                  "log": {"level": "info"},
                  "inbounds": [{"type": "socks", "tag": "socks-in", "listen": "127.0.0.1", "listen_port": 10808}],
                  "outbounds": []
              }
              
              raw_auth = unquote(p.netloc.split('@')[0] if '@' in p.netloc else "")
              server = p.hostname
              port = int(p.port or 443)
              sni = params.get("sni", server)

              outbound = {"tag": "proxy", "server": server, "server_port": port}

              if scheme == "vless":
                  outbound.update({
                      "type": "vless",
                      "uuid": raw_auth or p.username,
                      "packet_encoding": "xudp",
                      "tls": {"enabled": True, "server_name": sni, "insecure": True}
                  })
                  if params.get("type") == "ws":
                      outbound["transport"] = {
                          "type": "ws",
                          "path": unquote(params.get("path", "/")),
                          "headers": {"Host": sni}
                      }
                  if params.get("security") == "reality":
                      outbound["tls"]["reality"] = {
                          "enabled": True,
                          "public_key": params.get("pbk", ""),
                          "short_id": params.get("sid", "")
                      }

              elif scheme == "tuic":
                  u, pwd = raw_auth.split(':', 1) if ':' in raw_auth else (raw_auth, "")
                  outbound.update({
                      "type": "tuic", "uuid": u, "password": pwd,
                      "congestion_control": params.get("congestion_control", "cubic"),
                      "tls": {"enabled": True, "server_name": sni, "alpn": ["h3"], "insecure": True}
                  })

              elif scheme in ["hysteria2", "hy2"]:
                  outbound.update({
                      "type": "hysteria2", "password": raw_auth,
                      "tls": {"enabled": True, "server_name": sni, "insecure": True}
                  })
              elif scheme == "vmess":
                  try:
                      content = url[8:].split("#")[0]
                      vm = json.loads(base64.b64decode(content + "="*(4-len(content)%4)).decode())
                      outbound.update({"type": "vmess", "server": vm['add'], "server_port": int(vm['port']), "uuid": vm['id'], "security": "auto"})
                      if vm.get('tls') == "tls":
                          outbound["tls"] = {"enabled": True, "server_name": vm.get('sni', vm['add']), "insecure": True}
                  except: pass

              config["outbounds"].append(outbound)
              config["outbounds"].append({"type": "direct", "tag": "direct"})
              return config

          with open("config.json", "w") as f:
              json.dump(generate_singbox_config(), f, indent=2)
          PYEOF
          
          ./sing-box run -c config.json > proxy.log 2>&1 &
          echo "[INFO] Waiting for proxy connection..."
          sleep 15
          
          if curl -x socks5://127.0.0.1:10808 -s --max-time 15 https://www.google.com > /dev/null; then
            echo "[INFO] ✅ Proxy connected!"
            echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
          else
            echo "[ERROR] ❌ Proxy connection failed."
            exit 1
          fi

      - name: Run renew script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SOCKS5: ${{ env.PROXY_SOCKS5 }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python up.py

      - name: Commit and push cron.txt
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f cron.txt ]; then
            git add cron.txt
            git commit -m "chore: auto update worker cron schedule" || echo "No changes to commit"
            git push || echo "Push failed or nothing to push"
          fi
